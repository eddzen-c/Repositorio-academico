<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #00e5a0;
      --accent-dim: #00b37a;
      --danger: #ff4d4d;
      --text: #f0f0f0;
      --muted: #888;
      --cell: 20px;
      --cols: 20;
      --rows: 20;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
      user-select: none;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
    }

    header span {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .stats {
      display: flex;
      gap: 2rem;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .stat-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .stat-value {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      min-width: 3ch;
      text-align: center;
    }

    #board-wrap {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.82);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    #overlay.hidden { display: none; }

    #overlay h2 {
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
    }

    #overlay p {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    #overlay .final-score {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
    }

    button#btn {
      margin-top: 0.5rem;
      padding: 0.55rem 1.75rem;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: inherit;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.15s, color 0.15s;
    }

    button#btn:hover {
      background: var(--accent);
      color: #000;
    }

    .controls-hint {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-align: center;
    }

    .mobile-btns {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .mobile-row { display: flex; gap: 4px; }

    .dpad {
      width: 48px;
      height: 48px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: var(--muted);
      transition: background 0.1s, color 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .dpad:active {
      background: var(--border);
      color: var(--accent);
    }

    @media (pointer: coarse) {
      .mobile-btns { display: flex; }
      .controls-hint { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Snake</h1>
    <span>by reddy</span>
  </header>

  <div class="stats">
    <div class="stat">
      <span class="stat-label">Score</span>
      <span class="stat-value" id="score">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Best</span>
      <span class="stat-value" id="best">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Level</span>
      <span class="stat-value" id="level">1</span>
    </div>
  </div>

  <div id="board-wrap">
    <canvas id="canvas"></canvas>

    <div id="overlay">
      <h2 id="overlay-title">Snake</h2>
      <div class="final-score" id="overlay-score" style="display:none"></div>
      <p id="overlay-sub">Presiona jugar para comenzar</p>
      <button id="btn">Jugar</button>
    </div>
  </div>

  <div class="mobile-btns">
    <div class="mobile-row">
      <div class="dpad" data-dir="UP">▲</div>
    </div>
    <div class="mobile-row">
      <div class="dpad" data-dir="LEFT">◀</div>
      <div class="dpad" data-dir="DOWN">▼</div>
      <div class="dpad" data-dir="RIGHT">▶</div>
    </div>
  </div>

  <p class="controls-hint">← → ↑ ↓ &nbsp;·&nbsp; WASD &nbsp;·&nbsp; espacio para pausar</p>

  <script>
    const COLS = 20, ROWS = 20, CELL = 20;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width  = COLS * CELL;
    canvas.height = ROWS * CELL;

    const overlay      = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlaySub   = document.getElementById('overlay-sub');
    const overlayScore = document.getElementById('overlay-score');
    const btn          = document.getElementById('btn');
    const scoreEl      = document.getElementById('score');
    const bestEl       = document.getElementById('best');
    const levelEl      = document.getElementById('level');

    const COLORS = {
      bg:        '#0f0f0f',
      grid:      '#161616',
      headFill:  '#00e5a0',
      headStroke:'#00b37a',
      bodyFill:  '#00c98a',
      tailFill:  '#008f62',
      food:      '#ff4d4d',
      foodGlow:  '#ff1a1a',
      eye:       '#000',
    };

    let snake, dir, nextDir, food, score, best, level, speed, loop, paused, running;

    best = parseInt(localStorage.getItem('snake_best') || '0');
    bestEl.textContent = best;

    function initGame() {
      const mid = Math.floor(COLS / 2);
      snake = [
        { x: mid,   y: 10 },
        { x: mid-1, y: 10 },
        { x: mid-2, y: 10 },
      ];
      dir     = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score   = 0;
      level   = 1;
      speed   = 150;
      paused  = false;
      running = true;
      scoreEl.textContent = 0;
      levelEl.textContent = 1;
      placeFood();
    }

    function placeFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function tick() {
      if (paused || !running) return;
      dir = { ...nextDir };

      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
      if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('snake_best', best); }
        const newLevel = Math.floor(score / 5) + 1;
        if (newLevel !== level) { level = newLevel; levelEl.textContent = level; speed = Math.max(60, 150 - (level-1)*18); restartLoop(); }
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function restartLoop() {
      clearInterval(loop);
      loop = setInterval(tick, speed);
    }

    function draw() {
      ctx.fillStyle = COLORS.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          ctx.fillStyle = COLORS.grid;
          ctx.fillRect(x * CELL + 0.5, y * CELL + 0.5, CELL - 1, CELL - 1);
        }
      }

      ctx.fillStyle = COLORS.food;
      const fx = food.x * CELL + CELL / 2;
      const fy = food.y * CELL + CELL / 2;
      ctx.beginPath();
      ctx.arc(fx, fy, CELL / 2 - 2, 0, Math.PI * 2);
      ctx.fill();

      snake.forEach((seg, i) => {
        const t = i / snake.length;
        if (i === 0) {
          ctx.fillStyle = COLORS.headFill;
          ctx.strokeStyle = COLORS.headStroke;
          ctx.lineWidth = 1.5;
        } else {
          const r = parseInt(COLORS.bodyFill.slice(1,3),16);
          const g = parseInt(COLORS.bodyFill.slice(3,5),16);
          const b = parseInt(COLORS.bodyFill.slice(5,7),16);
          const rT = parseInt(COLORS.tailFill.slice(1,3),16);
          const gT = parseInt(COLORS.tailFill.slice(3,5),16);
          const bT = parseInt(COLORS.tailFill.slice(5,7),16);
          const ri = Math.round(r + (rT-r)*t);
          const gi = Math.round(g + (gT-g)*t);
          const bi = Math.round(b + (bT-b)*t);
          ctx.fillStyle = `rgb(${ri},${gi},${bi})`;
          ctx.strokeStyle = 'transparent';
          ctx.lineWidth = 0;
        }

        const radius = i === 0 ? 5 : 3;
        const px = seg.x * CELL + 1, py = seg.y * CELL + 1, pw = CELL - 2, ph = CELL - 2;
        ctx.beginPath();
        ctx.roundRect(px, py, pw, ph, radius);
        ctx.fill();
        if (i === 0) ctx.stroke();

        if (i === 0) {
          const eyeSize = 3;
          const ex = dir.x === 1 ? px+pw-6 : dir.x === -1 ? px+4 : px+4;
          const ey = dir.y === 1 ? py+ph-6 : dir.y === -1 ? py+4 : py+4;
          const ex2 = dir.y !== 0 ? px+pw-6 : ex;
          ctx.fillStyle = COLORS.eye;
          ctx.beginPath(); ctx.arc(ex,  ey,  eyeSize, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(ex2, dir.y !== 0 ? ey : ey + (CELL-8), eyeSize, 0, Math.PI*2); ctx.fill();
        }
      });
    }

    function gameOver() {
      running = false;
      clearInterval(loop);
      overlayTitle.textContent = 'Game Over';
      overlayScore.textContent = score;
      overlayScore.style.display = 'block';
      overlaySub.textContent = `Puntaje final · nivel ${level}`;
      btn.textContent = 'Reintentar';
      overlay.classList.remove('hidden');
    }

    btn.addEventListener('click', () => {
      overlay.classList.add('hidden');
      overlayScore.style.display = 'none';
      overlayTitle.textContent = 'Snake';
      btn.textContent = 'Jugar';
      initGame();
      draw();
      restartLoop();
    });

    document.addEventListener('keydown', e => {
      if (!running && e.code !== 'Space') return;
      switch(e.key) {
        case 'ArrowUp':    case 'w': case 'W': if (dir.y !== 1)  nextDir = {x:0,y:-1}; e.preventDefault(); break;
        case 'ArrowDown':  case 's': case 'S': if (dir.y !== -1) nextDir = {x:0,y:1};  e.preventDefault(); break;
        case 'ArrowLeft':  case 'a': case 'A': if (dir.x !== 1)  nextDir = {x:-1,y:0}; e.preventDefault(); break;
        case 'ArrowRight': case 'd': case 'D': if (dir.x !== -1) nextDir = {x:1,y:0};  e.preventDefault(); break;
        case ' ':
          if (!running) break;
          paused = !paused;
          if (!paused) { overlayTitle.textContent='Snake'; overlaySub.textContent=''; overlay.classList.add('hidden'); }
          else { overlayTitle.textContent='Pausa'; overlaySub.textContent='Presiona espacio para continuar'; overlayScore.style.display='none'; btn.style.display='none'; overlay.classList.remove('hidden'); }
          break;
      }
    });

    document.querySelectorAll('.dpad').forEach(d => {
      d.addEventListener('click', () => {
        if (!running) return;
        const map = { UP:{x:0,y:-1}, DOWN:{x:0,y:1}, LEFT:{x:-1,y:0}, RIGHT:{x:1,y:0} };
        const nd = map[d.dataset.dir];
        if (nd.x !== 0 && dir.x === -nd.x) return;
        if (nd.y !== 0 && dir.y === -nd.y) return;
        nextDir = nd;
      });
    });

    draw();
  </script>
</body>
</html>
